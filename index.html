<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anime Finder</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>Anime Finder</h1>
    <div class="search-container">
      <input type="text" id="searchInput" placeholder="Search anime...">
      <button id="searchBtn">Search</button>
    </div>
  </header>

  <main>
    <section id="results" class="results-grid">
      <!-- Anime cards will be injected here -->
    </section>
  </main>

  <footer>
    <p>Powered by MyAnimeList API</p>
  </footer>

</body>
</html>
